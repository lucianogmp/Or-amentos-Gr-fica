<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gráfica Master Print</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<!-- Tailwind CSS Play CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            50: '#eff6ff',
            100: '#dbeafe',
            400: '#60a5fa',
            500: '#3b82f6',
            600: '#2563eb',
            700: '#1d4ed8',
          },
          surface: {
            DEFAULT: '#1e293b',
            dark: '#0f172a',
            light: '#334155',
            lighter: '#475569',
          },
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
        },
      }
    }
  }
</script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  [x-cloak] { display: none !important; }
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  .fade-in { animation: fadeIn 0.3s ease-out; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .pulse-once { animation: pulseOnce 0.5s ease-out; }
  @keyframes pulseOnce {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }
</style>
</head>

<body class="bg-surface-dark min-h-screen font-sans text-slate-100 antialiased">

<div class="max-w-2xl mx-auto px-4 py-6 sm:px-6 lg:px-8 space-y-5">

  <!-- Header -->
  <header class="text-center space-y-1 pb-2">
    <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-white">
      Gráfica Master Print
    </h1>
    <p class="text-sm text-slate-400 font-medium">Sistema de Orçamentos</p>
  </header>

  <!-- Card: Dados do Cliente -->
  <section class="bg-surface rounded-2xl border border-slate-700/50 p-5 space-y-4 fade-in">
    <h3 class="text-xs font-semibold uppercase tracking-widest text-slate-400">
      Dados do Cliente
    </h3>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div class="space-y-1.5">
        <label for="cliente" class="block text-sm font-medium text-slate-400">Nome do Cliente</label>
        <input
          type="text"
          id="cliente"
          placeholder="Ex: João Silva"
          class="w-full bg-slate-800 text-white placeholder-slate-500 border border-slate-600 rounded-lg px-4 py-3 text-sm
                 focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30 transition-all duration-200"
        >
      </div>

      <div class="space-y-1.5">
        <label for="telefone" class="block text-sm font-medium text-slate-400">Telefone</label>
        <input
          type="tel"
          id="telefone"
          placeholder="(00) 00000-0000"
          inputmode="tel"
          class="w-full bg-slate-800 text-white placeholder-slate-500 border border-slate-600 rounded-lg px-4 py-3 text-sm
                 focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30 transition-all duration-200"
        >
      </div>
    </div>
  </section>

  <!-- Card: Medidas -->
  <section class="bg-surface rounded-2xl border border-slate-700/50 p-5 space-y-4 fade-in">
    <h3 class="text-xs font-semibold uppercase tracking-widest text-slate-400">
      Medidas
    </h3>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div class="space-y-1.5">
        <label for="largura" class="block text-sm font-medium text-slate-400">Largura</label>
        <div class="relative">
          <input
            type="number"
            id="largura"
            placeholder="0"
            inputmode="decimal"
            min="0"
            step="any"
            class="w-full bg-slate-800 text-white placeholder-slate-500 border border-slate-600 rounded-lg px-4 py-3 pr-12 text-sm
                   focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30 transition-all duration-200"
          >
          <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-medium text-slate-500">cm</span>
        </div>
      </div>

      <div class="space-y-1.5">
        <label for="altura" class="block text-sm font-medium text-slate-400">Altura</label>
        <div class="relative">
          <input
            type="number"
            id="altura"
            placeholder="0"
            inputmode="decimal"
            min="0"
            step="any"
            class="w-full bg-slate-800 text-white placeholder-slate-500 border border-slate-600 rounded-lg px-4 py-3 pr-12 text-sm
                   focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30 transition-all duration-200"
          >
          <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-medium text-slate-500">cm</span>
        </div>
      </div>

      <div class="space-y-1.5">
        <label for="quantidade" class="block text-sm font-medium text-slate-400">Quantidade</label>
        <input
          type="number"
          id="quantidade"
          value="1"
          inputmode="numeric"
          min="1"
          step="1"
          class="w-full bg-slate-800 text-white placeholder-slate-500 border border-slate-600 rounded-lg px-4 py-3 text-sm
                 focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30 transition-all duration-200"
        >
      </div>
    </div>
  </section>

  <!-- Card: Configurações Financeiras -->
  <section class="bg-surface rounded-2xl border border-slate-700/50 p-5 space-y-4 fade-in">
    <h3 class="text-xs font-semibold uppercase tracking-widest text-slate-400">
      Configurações Financeiras
    </h3>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div class="space-y-1.5">
        <label for="valor" class="block text-sm font-medium text-slate-400">Valor por m²</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-sm font-medium text-slate-500">R$</span>
          <input
            type="number"
            id="valor"
            placeholder="0,00"
            inputmode="decimal"
            min="0"
            step="any"
            class="w-full bg-slate-800 text-white placeholder-slate-500 border border-slate-600 rounded-lg pl-10 pr-4 py-3 text-sm
                   focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30 transition-all duration-200"
          >
        </div>
      </div>

      <div class="space-y-1.5">
        <label for="margem" class="block text-sm font-medium text-slate-400">Margem de lucro</label>
        <div class="relative">
          <input
            type="number"
            id="margem"
            value="20"
            inputmode="decimal"
            min="0"
            step="any"
            class="w-full bg-slate-800 text-white placeholder-slate-500 border border-slate-600 rounded-lg px-4 py-3 pr-10 text-sm
                   focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30 transition-all duration-200"
          >
          <span class="absolute right-3 top-1/2 -translate-y-1/2 text-sm font-medium text-slate-500">%</span>
        </div>
      </div>
    </div>

    <button
      onclick="calcular()"
      class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3.5 rounded-xl text-sm uppercase tracking-wide
             transition-all duration-200 hover:shadow-lg hover:shadow-brand-600/25 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-brand-500/40"
    >
      Calcular Orçamento
    </button>
  </section>

  <!-- Card: Resultado -->
  <section class="bg-surface rounded-2xl border border-brand-500/20 p-5 space-y-4 fade-in">
    <h3 class="text-xs font-semibold uppercase tracking-widest text-slate-400">
      Resultado
    </h3>

    <div class="text-center py-2">
      <p class="text-xs font-semibold uppercase tracking-widest text-slate-500 mb-1">Total</p>
      <p id="total" class="text-3xl sm:text-4xl font-bold text-brand-400 transition-all duration-300">
        R$ 0,00
      </p>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div class="bg-slate-800/60 rounded-lg p-3 text-center border border-slate-700/40">
        <p class="text-[11px] font-medium uppercase tracking-wider text-slate-500 mb-0.5">Unitário</p>
        <p id="unitario" class="text-sm font-semibold text-slate-200">R$ 0,00</p>
      </div>
      <div class="bg-slate-800/60 rounded-lg p-3 text-center border border-slate-700/40">
        <p class="text-[11px] font-medium uppercase tracking-wider text-slate-500 mb-0.5">Área</p>
        <p id="area" class="text-sm font-semibold text-slate-200">0,00 m²</p>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-3 pt-1">
      <button
        onclick="limpar()"
        class="bg-red-500/15 text-red-400 border border-red-500/30 hover:bg-red-500/25 font-semibold py-3 rounded-xl text-sm
               transition-all duration-200 active:scale-[0.97] focus:outline-none focus:ring-2 focus:ring-red-500/30"
      >
        Limpar
      </button>
      <button
        onclick="salvar()"
        class="bg-emerald-500/15 text-emerald-400 border border-emerald-500/30 hover:bg-emerald-500/25 font-semibold py-3 rounded-xl text-sm
               transition-all duration-200 active:scale-[0.97] focus:outline-none focus:ring-2 focus:ring-emerald-500/30"
      >
        Salvar
      </button>
      <button
        onclick="enviar()"
        class="bg-green-500/15 text-green-400 border border-green-500/30 hover:bg-green-500/25 font-semibold py-3 rounded-xl text-sm
               transition-all duration-200 active:scale-[0.97] focus:outline-none focus:ring-2 focus:ring-green-500/30"
      >
        WhatsApp
      </button>
    </div>

    <button
      onclick="gerarPDF()"
      class="w-full bg-amber-500/15 text-amber-400 border border-amber-500/30 hover:bg-amber-500/25 font-semibold py-3 rounded-xl text-sm
             transition-all duration-200 active:scale-[0.97] focus:outline-none focus:ring-2 focus:ring-amber-500/30"
    >
      Gerar PDF
    </button>
  </section>

  <!-- Card: Histórico -->
  <section class="bg-surface rounded-2xl border border-slate-700/50 p-5 space-y-3 fade-in">
    <h3 class="text-xs font-semibold uppercase tracking-widest text-slate-400">
      Histórico Recente
    </h3>
    <div id="lista" class="space-y-2 text-sm"></div>
  </section>

  <!-- Footer -->
  <footer class="text-center pt-2 pb-4">
    <p class="text-xs text-slate-600">Gráfica Master Print &mdash; Sistema de Orçamentos</p>
  </footer>

</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

let lista = JSON.parse(localStorage.getItem("orcamentos")) || [];

const totalEl = document.getElementById("total");
const unitarioEl = document.getElementById("unitario");
const areaEl = document.getElementById("area");

function calcular() {
  const l = parseFloat(largura.value) / 100 || 0;
  const a = parseFloat(altura.value) / 100 || 0;
  const q = parseFloat(quantidade.value) || 1;
  const v = parseFloat(valor.value) || 0;
  const m = parseFloat(margem.value) / 100 || 0;

  const area = l * a;
  const unitario = (area * v) * (1 + m);
  let total = unitario * q;
  total = isNaN(total) ? 0 : total;

  window.resultado = {
    cliente: cliente.value,
    telefone: telefone.value,
    total,
    unitario,
    area,
    data: new Date().toLocaleString()
  };

  totalEl.textContent = "R$ " + total.toFixed(2).replace('.', ',');
  unitarioEl.textContent = "R$ " + unitario.toFixed(2).replace('.', ',');
  areaEl.textContent = area.toFixed(2).replace('.', ',') + " m²";

  totalEl.classList.remove('pulse-once');
  void totalEl.offsetWidth;
  totalEl.classList.add('pulse-once');
}

function salvar() {
  if (!window.resultado) return alert("Calcule primeiro");
  lista.push(window.resultado);
  localStorage.setItem("orcamentos", JSON.stringify(lista));
  render();
}

function enviar() {
  if (!window.resultado) return alert("Calcule primeiro");

  const tel = telefone.value.replace(/\D/g, '');
  const msg =
`Gráfica Master Print

Cliente: ${window.resultado.cliente}
Total: R$ ${window.resultado.total.toFixed(2)}
Unitário: R$ ${window.resultado.unitario.toFixed(2)}
Área: ${window.resultado.area.toFixed(2)} m²
Data: ${window.resultado.data}`;

  const url = "https://wa.me/55" + tel + "?text=" + encodeURIComponent(msg);
  window.open(url);
}

function limpar() {
  document.querySelectorAll("input").forEach(i => i.value = "");
  margem.value = 20;
  quantidade.value = 1;
  totalEl.textContent = "R$ 0,00";
  unitarioEl.textContent = "R$ 0,00";
  areaEl.textContent = "0,00 m²";
  window.resultado = null;
}

function render() {
  const container = document.getElementById("lista");
  if (lista.length === 0) {
    container.innerHTML = '<p class="text-slate-500 text-sm italic">Nenhum orçamento salvo.</p>';
    return;
  }

  let html = "";
  lista.slice(-5).reverse().forEach(o => {
    html += `
      <div class="flex items-center justify-between bg-slate-800/60 border border-slate-700/30 rounded-lg px-4 py-3 hover:border-slate-600 transition-colors duration-150">
        <div>
          <p class="font-medium text-slate-200">${o.cliente || "Sem nome"}</p>
          <p class="text-xs text-slate-500 mt-0.5">${o.data || ""}</p>
        </div>
        <span class="text-sm font-semibold text-brand-400">R$ ${o.total.toFixed(2).replace('.', ',')}</span>
      </div>`;
  });
  container.innerHTML = html;
}

function formatarTelefone(input) {
  let v = input.value.replace(/\D/g, '');
  if (v.length > 11) v = v.slice(0, 11);
  if (v.length > 6) {
    v = '(' + v.slice(0,2) + ') ' + v.slice(2,7) + '-' + v.slice(7);
  } else if (v.length > 2) {
    v = '(' + v.slice(0,2) + ') ' + v.slice(2);
  } else if (v.length > 0) {
    v = '(' + v;
  }
  input.value = v;
}

document.getElementById('telefone').addEventListener('input', function() {
  formatarTelefone(this);
});

function gerarPDF() {
  if (!window.resultado) return alert("Calcule primeiro");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 20;

  doc.setFontSize(18);
  doc.text("Gráfica Master Print", 20, y);

  y += 10;
  doc.setFontSize(12);
  doc.text("Orçamento", 20, y);

  y += 10;
  doc.text("Cliente: " + (window.resultado.cliente || "Não informado"), 20, y);

  y += 8;
  doc.text("Data: " + window.resultado.data, 20, y);

  y += 12;
  doc.text("Área: " + window.resultado.area.toFixed(2) + " m²", 20, y);

  y += 8;
  doc.text("Valor Unitário: R$ " + window.resultado.unitario.toFixed(2), 20, y);

  y += 12;
  doc.setFontSize(16);
  doc.text("TOTAL: R$ " + window.resultado.total.toFixed(2), 20, y);

  doc.save("orcamento_masterprint.pdf");
}

render();
</script>

</body>
</html>
