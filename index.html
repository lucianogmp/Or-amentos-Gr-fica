<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gráfica Master Print</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 { font-size: 22px; }
h2 { font-size: 14px; color: #94a3b8; margin-bottom: 20px; }

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
}

.field {
  display: flex;
  flex-direction: column;
}

label {
  font-size: 12px;
  color: #94a3b8;
}

input {
  padding: 12px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.calcular { background: #38bdf8; width: 100%; margin-top: 10px; }
.enviar { background: #25d366; color: white; }
.salvar { background: #22c55e; color: white; }
.limpar { background: #ef4444; color: white; }
.pdf { background: #f59e0b; color: white; }

.total {
  font-size: 32px;
  color: #38bdf8;
  margin-top: 10px;
}

.result-grid {
  display: flex;
  justify-content: space-between;
}

.lista {
  font-size: 13px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Gráfica Master Print</h1>
<h2>Sistema de Orçamentos</h2>

<div class="card">
  <div class="field">
    <label>Nome do Cliente</label>
    <input id="cliente">
  </div>

  <div class="field">
    <label>Telefone</label>
    <input id="telefone">
  </div>
</div>

<div class="card">

<div class="grid">
  <div class="field">
    <label>Largura (cm)</label>
    <input id="largura">
  </div>

  <div class="field">
    <label>Altura (cm)</label>
    <input id="altura">
  </div>

  <div class="field">
    <label>Quantidade</label>
    <input id="quantidade" value="1">
  </div>
</div>

<div class="grid">
  <div class="field">
    <label>Valor m²</label>
    <input id="valor">
  </div>

  <div class="field">
    <label>Margem (%)</label>
    <input id="margem" value="20">
  </div>
</div>

<button class="calcular" onclick="calcular()">CALCULAR</button>

<div class="total" id="total">R$ 0,00</div>

<div class="result-grid">
  <div id="unitario">Unitário</div>
  <div id="area">Área</div>
</div>

<div class="grid" style="margin-top:10px;">
  <button class="limpar" onclick="limpar()">Limpar</button>
  <button class="salvar" onclick="salvar()">Salvar</button>
  <button class="enviar" onclick="enviar()">Enviar</button>
</div>

<button class="pdf" style="width:100%; margin-top:10px;" onclick="gerarPDF()">GERAR PDF</button>

</div>

<div class="card">
  <b>Histórico</b>
  <div id="lista" class="lista"></div>
</div>

<script>
// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// SISTEMA
let lista = JSON.parse(localStorage.getItem("orcamentos")) || [];

function calcular() {
  let l = largura.value / 100;
  let a = altura.value / 100;
  let q = quantidade.value;
  let v = valor.value;
  let m = margem.value / 100;

  let area = l * a;
  let unitario = (area * v) * (1 + m);
  let total = unitario * q;

  total = isNaN(total) ? 0 : total;

  window.resultado = {
    cliente: cliente.value,
    telefone: telefone.value,
    total,
    unitario,
    area,
    data: new Date().toLocaleString()
  };

  totalEl.innerHTML = "R$ " + total.toFixed(2);
  unitarioEl.innerHTML = "Unitário: R$ " + unitario.toFixed(2);
  areaEl.innerHTML = "Área: " + area.toFixed(2) + " m²";
}

const totalEl = document.getElementById("total");
const unitarioEl = document.getElementById("unitario");
const areaEl = document.getElementById("area");

function salvar() {
  if (!window.resultado) return alert("Calcule primeiro");
  lista.push(window.resultado);
  localStorage.setItem("orcamentos", JSON.stringify(lista));
  render();
}

function enviar() {
  if (!window.resultado) return alert("Calcule primeiro");

  let msg =
`Gráfica Master Print

Cliente: ${window.resultado.cliente}
Total: R$ ${window.resultado.total.toFixed(2)}
Unitário: R$ ${window.resultado.unitario.toFixed(2)}
Área: ${window.resultado.area.toFixed(2)} m²
Data: ${window.resultado.data}`;

  let url = "https://wa.me/55" + telefone.value + "?text=" + encodeURIComponent(msg);
  window.open(url);
}

function limpar() {
  document.querySelectorAll("input").forEach(i => i.value = "");
  margem.value = 20;
  quantidade.value = 1;
  totalEl.innerHTML = "R$ 0,00";
}

function render() {
  let html = "";
  lista.slice(-5).reverse().forEach(o => {
    html += `${o.cliente || "Sem nome"} - R$ ${o.total.toFixed(2)}<br>`;
  });
  document.getElementById("lista").innerHTML = html;
}

function gerarPDF() {
  if (!window.resultado) return alert("Calcule primeiro");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 20;

  doc.setFontSize(18);
  doc.text("Gráfica Master Print", 20, y);

  y += 10;
  doc.setFontSize(12);
  doc.text("Orçamento", 20, y);

  y += 10;
  doc.text("Cliente: " + (window.resultado.cliente || "Não informado"), 20, y);

  y += 8;
  doc.text("Data: " + window.resultado.data, 20, y);

  y += 12;
  doc.text("Área: " + window.resultado.area.toFixed(2) + " m²", 20, y);

  y += 8;
  doc.text("Valor Unitário: R$ " + window.resultado.unitario.toFixed(2), 20, y);

  y += 12;
  doc.setFontSize(16);
  doc.text("TOTAL: R$ " + window.resultado.total.toFixed(2), 20, y);

  doc.save("orcamento_masterprint.pdf");
}

render();
</script>

</body>
</html>
