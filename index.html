<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gráfica Master Print</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  font-size: 22px;
  margin-bottom: 5px;
}

h2 {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

@media (max-width: 600px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

.field {
  display: flex;
  flex-direction: column;
}

label {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 4px;
}

input {
  padding: 12px;
  border-radius: 8px;
  border: none;
}

.calcular {
  width: 100%;
  background: #38bdf8;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  font-weight: bold;
}

.total {
  font-size: 32px;
  font-weight: bold;
  margin-top: 20px;
  color: #38bdf8;
}

.result-grid {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.actions button {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
}

.limpar { background: #ef4444; color: white; }
.salvar { background: #22c55e; color: white; }
.enviar { background: #25d366; color: white; }

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
}

.historico {
  margin-top: 20px;
  font-size: 13px;
  color: #cbd5f5;
}
</style>
</head>

<body>

<h1>Gráfica Masterprint</h1>
<h2>Calculadora de Orçamento</h2>

<div class="card">

<div class="grid">
  <div class="field">
    <label>Largura (cm)</label>
    <input id="largura">
  </div>

  <div class="field">
    <label>Altura (cm)</label>
    <input id="altura">
  </div>

  <div class="field">
    <label>Quantidade</label>
    <input id="quantidade" value="1">
  </div>
</div>

<div class="grid">
  <div class="field">
    <label>Valor m²</label>
    <input id="valor">
  </div>

  <div class="field">
    <label>Desperdício (%)</label>
    <input id="desperdicio" value="0">
  </div>

  <div class="field">
    <label>Margem (%)</label>
    <input id="margem" value="20">
  </div>
</div>

<button class="calcular" onclick="calcular()">CALCULAR</button>

<div class="total" id="total">R$ 0,00</div>

<div class="result-grid">
  <div id="unitario">Unitário: R$ 0,00</div>
  <div id="area">Área: 0 m²</div>
</div>

<div class="actions">
  <button class="limpar" onclick="limpar()">Limpar</button>
  <button class="salvar" onclick="salvar()">Salvar</button>
  <button class="enviar" onclick="enviar()">Enviar</button>
</div>

</div>

<div class="historico" id="historico"></div>

<script>
let historico = JSON.parse(localStorage.getItem("historico")) || [];

function calcular() {
  let l = largura.value / 100;
  let a = altura.value / 100;
  let q = quantidade.value;
  let v = valor.value;
  let d = desperdicio.value / 100;
  let m = margem.value / 100;

  let area = l * a;
  let areaFinal = area * (1 + d);
  let preco = areaFinal * v;
  let precoFinal = preco * (1 + m);
  let total = precoFinal * q;

  total = isNaN(total) ? 0 : total;

  document.getElementById("total").innerHTML = "R$ " + total.toFixed(2);
  document.getElementById("unitario").innerHTML = "Unitário: R$ " + precoFinal.toFixed(2);
  document.getElementById("area").innerHTML = "Área: " + area.toFixed(2) + " m²";

  window.resultado = { total, precoFinal, area, data: new Date().toLocaleString() };
}

function limpar() {
  document.querySelectorAll("input").forEach(i => i.value = "");
  margem.value = 20;
  quantidade.value = 1;
  total.innerHTML = "R$ 0,00";
}

function salvar() {
  if (!window.resultado) return alert("Calcule primeiro!");

  historico.push(window.resultado);
  localStorage.setItem("historico", JSON.stringify(historico));
  renderHistorico();
}

function enviar() {
  if (!window.resultado) return alert("Calcule primeiro!");

  let msg = `Gráfica Masterprint\n\nOrçamento:\nTotal: R$ ${window.resultado.total.toFixed(2)}\nUnitário: R$ ${window.resultado.precoFinal.toFixed(2)}\nÁrea: ${window.resultado.area.toFixed(2)} m²\nData: ${window.resultado.data}`;

  let url = "https://wa.me/?text=" + encodeURIComponent(msg);
  window.open(url);
}

function renderHistorico() {
  let html = "<b>Histórico:</b><br>";
  historico.slice(-5).reverse().forEach(o => {
    html += `R$ ${o.total.toFixed(2)} - ${o.data}<br>`;
  });
  document.getElementById("historico").innerHTML = html;
}

renderHistorico();
</script>

</body>
</html>
